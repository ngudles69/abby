<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Wild Match</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e8e8;font-family:Georgia,'Times New Roman',serif;overflow:hidden;width:100vw;height:100vh;touch-action:none;user-select:none;-webkit-user-select:none}
canvas#gameCanvas{display:block;position:absolute;top:0;left:0}
.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.screen.active{display:flex}
#title-screen{background:radial-gradient(ellipse at 50% 30%,#1a1a2e 0%,#0a0a0f 70%)}
#title-screen h1{font-size:clamp(2.8rem,9vw,5rem);font-weight:bold;letter-spacing:0.08em;color:#fff;text-shadow:0 0 60px rgba(255,255,255,0.1);margin-bottom:0.15em}
#title-screen .subtitle{font-family:system-ui,sans-serif;font-size:clamp(0.7rem,2.2vw,1rem);letter-spacing:0.35em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:2.5em;font-weight:300}
.btn{background:transparent;border:1px solid rgba(255,255,255,0.25);color:#fff;padding:14px 52px;font-family:system-ui,sans-serif;font-size:0.9rem;letter-spacing:0.18em;text-transform:uppercase;cursor:pointer;transition:all 0.3s;border-radius:2px;font-weight:300}
.btn:hover,.btn:active{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.5)}
#level-screen{background:rgba(10,10,15,0.98);overflow-y:auto;justify-content:flex-start;padding:50px 20px 40px}
#level-screen h2{font-size:1.5rem;letter-spacing:0.08em;margin-bottom:28px;color:rgba(255,255,255,0.75)}
.level-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:340px;width:100%}
.level-btn{aspect-ratio:1;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.02);color:#fff;font-family:Georgia,serif;font-size:1.2rem;cursor:pointer;border-radius:3px;transition:all 0.2s;position:relative}
.level-btn.unlocked:hover,.level-btn.unlocked:active{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.35)}
.level-btn.locked{opacity:0.2;cursor:default}
.level-btn .stars{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);font-size:0.5rem;letter-spacing:1px;color:rgba(255,255,255,0.5)}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(10,10,15,0.93);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:30;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.overlay.active{display:flex}
.overlay h2{font-size:2rem;margin-bottom:8px;letter-spacing:0.04em}
.overlay .detail{font-family:system-ui,sans-serif;font-size:0.85rem;color:rgba(255,255,255,0.45);margin-bottom:5px;font-weight:300}
.overlay .star-display{font-size:1.8rem;letter-spacing:8px;margin-bottom:22px;color:rgba(255,255,255,0.65)}
.overlay .btn{margin:5px 0;min-width:200px;text-align:center}
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="title-screen" class="screen active">
  <h1>Wild Match</h1>
  <p class="subtitle">A Match-3 Adventure</p>
  <button class="btn" onclick="showLevelSelect()">Play</button>
</div>

<div id="level-screen" class="screen">
  <h2>Select Level</h2>
  <div class="level-grid" id="level-grid"></div>
  <button class="btn" style="margin-top:22px" onclick="showTitle()">Back</button>
</div>

<div id="win-overlay" class="overlay">
  <h2>Level Complete</h2>
  <div class="detail" id="win-score"></div>
  <div class="star-display" id="win-stars"></div>
  <button class="btn" onclick="nextLevel()">Next Level</button>
  <button class="btn" onclick="showLevelSelect()">Levels</button>
</div>

<div id="lose-overlay" class="overlay">
  <h2>Out of Moves</h2>
  <div class="detail" id="lose-score"></div>
  <button class="btn" onclick="retryLevel()">Retry</button>
  <button class="btn" onclick="showLevelSelect()">Levels</button>
</div>

<div id="pause-overlay" class="overlay">
  <h2>Paused</h2>
  <button class="btn" onclick="togglePause()">Resume</button>
  <button class="btn" onclick="showLevelSelect()">Quit</button>
</div>

<script>
// ============================================================
// WILD MATCH — Fully Offline, Zero Dependencies
// Pure Canvas 2D + Web Audio API
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resizeCanvas() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); if (gameActive) { computeLayout(); renderGame(); } });

// ── ANIMAL ICONS ──
const ANIMALS = [
  { name:'Lion', draw:drawLion },
  { name:'Whale', draw:drawWhale },
  { name:'Eagle', draw:drawEagle },
  { name:'Wolf', draw:drawWolf },
  { name:'Bear', draw:drawBear },
  { name:'Snake', draw:drawSnake },
  { name:'Elephant', draw:drawElephant },
  { name:'Owl', draw:drawOwl },
  { name:'Dolphin', draw:drawDolphin },
  { name:'Fox', draw:drawFox }
];
const iconCache = [];
function buildIcons() {
  ANIMALS.forEach(a => {
    const c = document.createElement('canvas');
    c.width = 128; c.height = 128;
    const g = c.getContext('2d');
    g.strokeStyle = '#fff'; g.fillStyle = '#fff';
    g.lineWidth = 2.5; g.lineCap = 'round'; g.lineJoin = 'round';
    a.draw(g, 64, 64, 48);
    iconCache.push(c);
  });
}

function drawLion(g,cx,cy,s){
  for(let i=0;i<12;i++){const a=(i/12)*Math.PI*2-Math.PI/2,r1=s*.55,r2=s*.88;g.beginPath();g.moveTo(cx+Math.cos(a)*r1,cy+Math.sin(a)*r1);g.lineTo(cx+Math.cos(a)*r2,cy+Math.sin(a)*r2);g.stroke()}
  g.beginPath();g.arc(cx,cy,s*.45,0,Math.PI*2);g.stroke();
  g.beginPath();g.arc(cx-s*.15,cy-s*.08,s*.05,0,Math.PI*2);g.fill();
  g.beginPath();g.arc(cx+s*.15,cy-s*.08,s*.05,0,Math.PI*2);g.fill();
  g.beginPath();g.moveTo(cx,cy+s*.05);g.lineTo(cx-s*.08,cy+s*.16);g.lineTo(cx+s*.08,cy+s*.16);g.closePath();g.fill();
}
function drawWhale(g,cx,cy,s){
  g.beginPath();g.ellipse(cx,cy+s*.05,s*.7,s*.35,0,0,Math.PI*2);g.stroke();
  g.beginPath();g.moveTo(cx+s*.65,cy);g.quadraticCurveTo(cx+s*.9,cy-s*.4,cx+s*.75,cy-s*.55);g.stroke();
  g.beginPath();g.moveTo(cx+s*.65,cy+s*.1);g.quadraticCurveTo(cx+s*.9,cy+s*.5,cx+s*.75,cy+s*.6);g.stroke();
  g.beginPath();g.arc(cx-s*.35,cy-s*.02,s*.05,0,Math.PI*2);g.fill();
  g.beginPath();g.moveTo(cx-s*.15,cy-s*.35);g.lineTo(cx-s*.15,cy-s*.6);g.stroke();
  g.beginPath();g.moveTo(cx-s*.25,cy-s*.55);g.lineTo(cx-s*.15,cy-s*.65);g.lineTo(cx-s*.05,cy-s*.55);g.stroke();
}
function drawEagle(g,cx,cy,s){
  g.beginPath();g.ellipse(cx,cy+s*.1,s*.18,s*.28,0,0,Math.PI*2);g.stroke();
  g.beginPath();g.moveTo(cx-s*.13,cy);g.quadraticCurveTo(cx-s*.6,cy-s*.5,cx-s*.85,cy-s*.15);g.lineTo(cx-s*.65,cy+s*.05);g.stroke();
  g.beginPath();g.moveTo(cx+s*.13,cy);g.quadraticCurveTo(cx+s*.6,cy-s*.5,cx+s*.85,cy-s*.15);g.lineTo(cx+s*.65,cy+s*.05);g.stroke();
  g.beginPath();g.arc(cx,cy-s*.28,s*.14,0,Math.PI*2);g.stroke();
  g.beginPath();g.moveTo(cx,cy-s*.22);g.lineTo(cx+s*.12,cy-s*.15);g.lineTo(cx,cy-s*.18);g.stroke();
  g.beginPath();g.arc(cx-s*.04,cy-s*.3,s*.03,0,Math.PI*2);g.fill();
}
function drawWolf(g,cx,cy,s){
  g.beginPath();g.arc(cx,cy+s*.1,s*.4,0,Math.PI*2);g.stroke();
  g.beginPath();g.moveTo(cx-s*.25,cy-s*.2);g.lineTo(cx-s*.4,cy-s*.7);g.lineTo(cx-s*.05,cy-s*.3);g.stroke();
  g.beginPath();g.moveTo(cx+s*.25,cy-s*.2);g.lineTo(cx+s*.4,cy-s*.7);g.lineTo(cx+s*.05,cy-s*.3);g.stroke();
  g.beginPath();g.moveTo(cx-s*.22,cy-s*.02);g.lineTo(cx-s*.12,cy-s*.08);g.lineTo(cx-s*.05,cy);g.stroke();
  g.beginPath();g.moveTo(cx+s*.22,cy-s*.02);g.lineTo(cx+s*.12,cy-s*.08);g.lineTo(cx+s*.05,cy);g.stroke();
  g.beginPath();g.ellipse(cx,cy+s*.25,s*.15,s*.12,0,0,Math.PI*2);g.stroke();
  g.beginPath();g.arc(cx,cy+s*.22,s*.04,0,Math.PI*2);g.fill();
}
function drawBear(g,cx,cy,s){
  g.beginPath();g.arc(cx,cy+s*.05,s*.42,0,Math.PI*2);g.stroke();
  g.beginPath();g.arc(cx-s*.33,cy-s*.32,s*.15,0,Math.PI*2);g.stroke();
  g.beginPath();g.arc(cx+s*.33,cy-s*.32,s*.15,0,Math.PI*2);g.stroke();
  g.beginPath();g.arc(cx-s*.33,cy-s*.32,s*.07,0,Math.PI*2);g.stroke();
  g.beginPath();g.arc(cx+s*.33,cy-s*.32,s*.07,0,Math.PI*2);g.stroke();
  g.beginPath();g.arc(cx-s*.14,cy-s*.05,s*.05,0,Math.PI*2);g.fill();
  g.beginPath();g.arc(cx+s*.14,cy-s*.05,s*.05,0,Math.PI*2);g.fill();
  g.beginPath();g.ellipse(cx,cy+s*.18,s*.12,s*.09,0,0,Math.PI*2);g.stroke();
  g.beginPath();g.arc(cx,cy+s*.15,s*.04,0,Math.PI*2);g.fill();
}
function drawSnake(g,cx,cy,s){
  g.beginPath();g.moveTo(cx-s*.5,cy+s*.4);g.bezierCurveTo(cx-s*.8,cy-s*.1,cx-s*.2,cy-s*.6,cx+s*.1,cy-s*.2);g.bezierCurveTo(cx+s*.4,cy+s*.2,cx-s*.1,cy+s*.5,cx+s*.3,cy+s*.1);g.bezierCurveTo(cx+s*.5,cy-s*.1,cx+s*.3,cy-s*.5,cx+s*.5,cy-s*.6);g.stroke();
  g.beginPath();g.ellipse(cx+s*.5,cy-s*.65,s*.12,s*.08,.3,0,Math.PI*2);g.stroke();
  g.beginPath();g.arc(cx+s*.48,cy-s*.68,s*.03,0,Math.PI*2);g.fill();
  g.beginPath();g.moveTo(cx+s*.6,cy-s*.63);g.lineTo(cx+s*.72,cy-s*.58);g.moveTo(cx+s*.67,cy-s*.6);g.lineTo(cx+s*.72,cy-s*.67);g.stroke();
}
function drawElephant(g,cx,cy,s){
  g.beginPath();g.arc(cx,cy-s*.1,s*.38,0,Math.PI*2);g.stroke();
  g.beginPath();g.ellipse(cx-s*.52,cy-s*.05,s*.18,s*.28,-.2,0,Math.PI*2);g.stroke();
  g.beginPath();g.ellipse(cx+s*.52,cy-s*.05,s*.18,s*.28,.2,0,Math.PI*2);g.stroke();
  g.beginPath();g.moveTo(cx-s*.07,cy+s*.18);g.quadraticCurveTo(cx-s*.14,cy+s*.52,cx+s*.04,cy+s*.68);g.stroke();
  g.beginPath();g.moveTo(cx+s*.07,cy+s*.18);g.quadraticCurveTo(cx,cy+s*.48,cx+s*.14,cy+s*.63);g.stroke();
  g.beginPath();g.arc(cx-s*.14,cy-s*.15,s*.04,0,Math.PI*2);g.fill();
  g.beginPath();g.arc(cx+s*.14,cy-s*.15,s*.04,0,Math.PI*2);g.fill();
}
function drawOwl(g,cx,cy,s){
  g.beginPath();g.ellipse(cx,cy+s*.1,s*.33,s*.42,0,0,Math.PI*2);g.stroke();
  g.beginPath();g.arc(cx-s*.15,cy-s*.08,s*.17,0,Math.PI*2);g.stroke();
  g.beginPath();g.arc(cx+s*.15,cy-s*.08,s*.17,0,Math.PI*2);g.stroke();
  g.beginPath();g.arc(cx-s*.15,cy-s*.08,s*.07,0,Math.PI*2);g.fill();
  g.beginPath();g.arc(cx+s*.15,cy-s*.08,s*.07,0,Math.PI*2);g.fill();
  g.beginPath();g.moveTo(cx-s*.18,cy-s*.38);g.lineTo(cx-s*.33,cy-s*.68);g.lineTo(cx-s*.03,cy-s*.42);g.stroke();
  g.beginPath();g.moveTo(cx+s*.18,cy-s*.38);g.lineTo(cx+s*.33,cy-s*.68);g.lineTo(cx+s*.03,cy-s*.42);g.stroke();
  g.beginPath();g.moveTo(cx,cy+s*.04);g.lineTo(cx-s*.06,cy+s*.14);g.lineTo(cx+s*.06,cy+s*.14);g.closePath();g.fill();
}
function drawDolphin(g,cx,cy,s){
  g.beginPath();g.moveTo(cx-s*.7,cy+s*.1);g.quadraticCurveTo(cx-s*.3,cy-s*.6,cx+s*.3,cy-s*.2);g.quadraticCurveTo(cx+s*.6,cy,cx+s*.5,cy+s*.3);g.quadraticCurveTo(cx+s*.2,cy+s*.5,cx-s*.2,cy+s*.3);g.quadraticCurveTo(cx-s*.5,cy+s*.15,cx-s*.7,cy+s*.1);g.stroke();
  g.beginPath();g.moveTo(cx+s*.5,cy+s*.3);g.lineTo(cx+s*.8,cy+s*.15);g.stroke();
  g.beginPath();g.moveTo(cx-s*.05,cy-s*.15);g.lineTo(cx-s*.15,cy-s*.5);g.lineTo(cx+s*.1,cy-s*.2);g.stroke();
  g.beginPath();g.moveTo(cx-s*.65,cy+s*.05);g.lineTo(cx-s*.85,cy-s*.2);g.stroke();
  g.beginPath();g.moveTo(cx-s*.65,cy+s*.15);g.lineTo(cx-s*.85,cy+s*.35);g.stroke();
  g.beginPath();g.arc(cx+s*.35,cy+s*.1,s*.04,0,Math.PI*2);g.fill();
}
function drawFox(g,cx,cy,s){
  g.beginPath();g.arc(cx,cy+s*.08,s*.36,0,Math.PI*2);g.stroke();
  g.beginPath();g.moveTo(cx-s*.18,cy-s*.2);g.lineTo(cx-s*.33,cy-s*.72);g.lineTo(cx,cy-s*.24);g.stroke();
  g.beginPath();g.moveTo(cx+s*.18,cy-s*.2);g.lineTo(cx+s*.33,cy-s*.72);g.lineTo(cx,cy-s*.24);g.stroke();
  g.beginPath();g.moveTo(cx-s*.14,cy+s*.15);g.lineTo(cx,cy+s*.42);g.lineTo(cx+s*.14,cy+s*.15);g.stroke();
  g.beginPath();g.arc(cx,cy+s*.33,s*.04,0,Math.PI*2);g.fill();
  g.beginPath();g.moveTo(cx-s*.2,cy);g.lineTo(cx-s*.1,cy-s*.06);g.lineTo(cx-s*.07,cy+s*.02);g.stroke();
  g.beginPath();g.moveTo(cx+s*.2,cy);g.lineTo(cx+s*.1,cy-s*.06);g.lineTo(cx+s*.07,cy+s*.02);g.stroke();
}

buildIcons();

// ── SOUND ──
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function tone(f,d,type='sine',v=.12){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=f;g.gain.setValueAtTime(v,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d)}
function sfxMatch(){tone(523,.15);setTimeout(()=>tone(659,.12),80)}
function sfxCombo(){tone(587,.1);setTimeout(()=>tone(740,.1),60);setTimeout(()=>tone(880,.15),120)}
function sfxPowerup(){tone(440,.08);setTimeout(()=>tone(660,.08),50);setTimeout(()=>tone(880,.08),100);setTimeout(()=>tone(1100,.15),150)}
function sfxSwap(){tone(330,.08,'triangle',.08)}
function sfxBad(){tone(200,.2,'sawtooth',.06)}
function sfxWin(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.25),i*120))}
function sfxLose(){[400,350,300,250].forEach((f,i)=>setTimeout(()=>tone(f,.3,'triangle',.1),i*150))}

// ── LEVELS ──
const LEVELS=[];
(function(){for(let i=0;i<20;i++){
  const lv={id:i+1};
  if(i<10){lv.cols=8;lv.rows=8}else if(i<15){lv.cols=8;lv.rows=9}else{lv.cols=9;lv.rows=9}
  lv.numTypes=i<3?6:i<8?7:i<14?8:10;
  lv.moves=Math.max(15,35-i);
  if(i%3===0){lv.goalType='score';lv.targetScore=800+i*400}
  else if(i%3===1){lv.goalType='collect';const n=Math.min(3,1+Math.floor(i/5));lv.collectGoals=[];for(let c=0;c<n;c++)lv.collectGoals.push({type:c,count:6+Math.floor(i/4)*2})}
  else{lv.goalType='both';lv.targetScore=500+i*250;lv.collectGoals=[{type:i%10,count:8+Math.floor(i/5)*2}]}
  lv.iceCount=i>=5?Math.min(8,i-4):0;
  lv.stoneCount=i>=10?Math.min(5,i-9):0;
  lv.chainCount=i>=14?Math.min(6,i-13):0;
  lv.star2=(lv.targetScore||1000+i*300)*1.5;
  lv.star3=(lv.targetScore||1000+i*300)*2.2;
  LEVELS.push(lv);
}})();

// ── STATE ──
let board=[],currentLevel=0,score=0,movesLeft=0,collected={};
let selectedCell=null,animating=false,gameActive=false;
let cellSize,boardX,boardY,hudH=62;

// ── SAVE ──
function getProgress(){try{return JSON.parse(localStorage.getItem('wm_prog')||'{}')}catch{return{}}}
function saveProgress(lv,stars){const p=getProgress();if(!p[lv]||p[lv]<stars)p[lv]=stars;if(!p.max||lv+1>p.max)p.max=lv+1;localStorage.setItem('wm_prog',JSON.stringify(p))}
function getMaxUnlocked(){return getProgress().max||1}

// ── SCREENS ──
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.overlay').forEach(o=>o.classList.remove('active'));document.getElementById(id).classList.add('active')}
function showTitle(){gameActive=false;showScreen('title-screen')}
function showLevelSelect(){
  gameActive=false;showScreen('level-screen');
  const grid=document.getElementById('level-grid');grid.innerHTML='';
  const mx=getMaxUnlocked(),prog=getProgress();
  for(let i=0;i<20;i++){
    const btn=document.createElement('button');btn.className='level-btn '+(i<mx?'unlocked':'locked');btn.textContent=i+1;
    if(prog[i+1]){const sd=document.createElement('div');sd.className='stars';sd.textContent='★'.repeat(prog[i+1])+'☆'.repeat(3-prog[i+1]);btn.appendChild(sd)}
    if(i<mx){const lvl=i;btn.onclick=()=>startLevel(lvl)}
    grid.appendChild(btn);
  }
}
function retryLevel(){startLevel(currentLevel)}
function nextLevel(){currentLevel<19?startLevel(currentLevel+1):showLevelSelect()}
function togglePause(){const p=document.getElementById('pause-overlay');if(p.classList.contains('active')){p.classList.remove('active');gameActive=true}else{p.classList.add('active');gameActive=false}}

// ── LAYOUT ──
function computeLayout(){
  const lv=LEVELS[currentLevel];
  const availH=H-hudH-16,availW=W-12;
  cellSize=Math.min(availW/lv.cols,availH/lv.rows);
  const bw=cellSize*lv.cols,bh=cellSize*lv.rows;
  boardX=(W-bw)/2;boardY=hudH+(availH-bh)/2;
}

// ── BOARD INIT ──
function startLevel(idx){
  initAudio();currentLevel=idx;
  const lv=LEVELS[idx];score=0;movesLeft=lv.moves;collected={};
  if(lv.collectGoals)lv.collectGoals.forEach(g=>collected[g.type]=0);
  selectedCell=null;animating=false;gameActive=true;
  showScreen('game-screen');computeLayout();
  const stones=new Set();
  while(stones.size<lv.stoneCount){const r=1+Math.floor(Math.random()*(lv.rows-2)),c=1+Math.floor(Math.random()*(lv.cols-2));stones.add(r+','+c)}
  const ices=new Set();
  while(ices.size<lv.iceCount){const r=Math.floor(Math.random()*lv.rows),c=Math.floor(Math.random()*lv.cols);if(!stones.has(r+','+c))ices.add(r+','+c)}
  const chains=new Set();
  while(chains.size<lv.chainCount){const r=Math.floor(Math.random()*lv.rows),c=Math.floor(Math.random()*lv.cols);if(!stones.has(r+','+c))chains.add(r+','+c)}
  board=[];
  for(let r=0;r<lv.rows;r++){board[r]=[];for(let c=0;c<lv.cols;c++){
    if(stones.has(r+','+c))board[r][c]={type:-1,stone:true,ice:false,chain:false,special:null,oy:0,scale:1,alpha:1,_dx:0,_dy:0};
    else board[r][c]={type:Math.floor(Math.random()*lv.numTypes),stone:false,ice:ices.has(r+','+c),chain:chains.has(r+','+c),special:null,oy:0,scale:1,alpha:1,_dx:0,_dy:0};
  }}
  resolveInit(lv);renderGame();
}

function resolveInit(lv){
  let found=true,tries=0;
  while(found&&tries<200){found=false;tries++;
    for(let r=0;r<lv.rows;r++)for(let c=0;c<lv.cols;c++){
      if(board[r][c].stone)continue;
      if(c>=2&&!board[r][c-1].stone&&!board[r][c-2].stone&&board[r][c].type===board[r][c-1].type&&board[r][c].type===board[r][c-2].type){let nt;do{nt=Math.floor(Math.random()*lv.numTypes)}while(nt===board[r][c].type);board[r][c].type=nt;found=true}
      if(r>=2&&!board[r-1][c].stone&&!board[r-2][c].stone&&board[r][c].type===board[r-1][c].type&&board[r][c].type===board[r-2][c].type){let nt;do{nt=Math.floor(Math.random()*lv.numTypes)}while(nt===board[r][c].type);board[r][c].type=nt;found=true}
    }
  }
}

// ── RENDERING ──
function drawBoard(){
  const lv=LEVELS[currentLevel];
  ctx.fillStyle='#111118';
  ctx.fillRect(boardX-3,boardY-3,cellSize*lv.cols+6,cellSize*lv.rows+6);
  ctx.strokeStyle='#1a1a28';ctx.lineWidth=1;
  for(let r=0;r<=lv.rows;r++){ctx.beginPath();ctx.moveTo(boardX,boardY+r*cellSize);ctx.lineTo(boardX+lv.cols*cellSize,boardY+r*cellSize);ctx.stroke()}
  for(let c=0;c<=lv.cols;c++){ctx.beginPath();ctx.moveTo(boardX+c*cellSize,boardY);ctx.lineTo(boardX+c*cellSize,boardY+lv.rows*cellSize);ctx.stroke()}
  for(let r=0;r<lv.rows;r++)for(let c=0;c<lv.cols;c++){
    const cell=board[r][c];
    const px=boardX+c*cellSize+cellSize/2+(cell._dx||0);
    const py=boardY+r*cellSize+cellSize/2+(cell._dy||0)+(cell.oy||0);
    if(cell.stone){
      ctx.fillStyle='rgba(60,60,70,0.6)';ctx.fillRect(px-cellSize*.42,py-cellSize*.42,cellSize*.84,cellSize*.84);
      ctx.strokeStyle='rgba(90,90,100,0.5)';ctx.lineWidth=2;ctx.strokeRect(px-cellSize*.42,py-cellSize*.42,cellSize*.84,cellSize*.84);
      ctx.beginPath();ctx.moveTo(px-cellSize*.42,py);ctx.lineTo(px+cellSize*.42,py);ctx.stroke();
      ctx.beginPath();ctx.moveTo(px,py-cellSize*.42);ctx.lineTo(px,py+cellSize*.42);ctx.stroke();
      continue;
    }
    if(cell.type<0)continue;
    if(cell.ice){
      ctx.fillStyle='rgba(100,180,255,0.1)';ctx.fillRect(px-cellSize*.45,py-cellSize*.45,cellSize*.9,cellSize*.9);
      ctx.strokeStyle='rgba(130,200,255,0.3)';ctx.lineWidth=1.5;ctx.strokeRect(px-cellSize*.45,py-cellSize*.45,cellSize*.9,cellSize*.9);
    }
    ctx.save();ctx.translate(px,py);ctx.scale(cell.scale,cell.scale);ctx.globalAlpha=cell.alpha;
    const is=cellSize*.72;
    ctx.drawImage(iconCache[cell.type],-is/2,-is/2,is,is);
    ctx.restore();
    if(cell.special){
      ctx.save();ctx.translate(px,py);ctx.globalAlpha=.85;
      if(cell.special==='bomb'){
        ctx.fillStyle='rgba(255,100,50,0.55)';ctx.beginPath();ctx.arc(0,0,cellSize*.16,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,0,cellSize*.16,0,Math.PI*2);ctx.stroke();
      }else{
        ctx.strokeStyle='rgba(255,220,80,0.7)';ctx.lineWidth=2.5;
        if(cell.special==='hline'){ctx.beginPath();ctx.moveTo(-cellSize*.35,0);ctx.lineTo(cellSize*.35,0);ctx.stroke()}
        else{ctx.beginPath();ctx.moveTo(0,-cellSize*.35);ctx.lineTo(0,cellSize*.35);ctx.stroke()}
      }
      ctx.restore();
    }
    if(cell.chain){
      ctx.strokeStyle='rgba(200,170,80,0.4)';ctx.lineWidth=2;
      for(let i=0;i<3;i++){const y=py-cellSize*.22+i*cellSize*.2;
        ctx.beginPath();ctx.ellipse(px-cellSize*.07,y,cellSize*.09,cellSize*.06,0,0,Math.PI*2);ctx.stroke();
        ctx.beginPath();ctx.ellipse(px+cellSize*.07,y+cellSize*.1,cellSize*.09,cellSize*.06,0,0,Math.PI*2);ctx.stroke();
      }
    }
  }
  if(selectedCell){
    const sx=boardX+selectedCell.c*cellSize,sy=boardY+selectedCell.r*cellSize;
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2;ctx.strokeRect(sx+2,sy+2,cellSize-4,cellSize-4);
  }
}

function drawHUD(){
  const lv=LEVELS[currentLevel];
  ctx.fillStyle='rgba(10,10,15,0.92)';ctx.fillRect(0,0,W,hudH);
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='600 9px system-ui,sans-serif';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('SCORE',14,14);
  ctx.fillStyle='#fff';ctx.font='bold 20px Georgia,serif';ctx.fillText(score,14,27);
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='600 9px system-ui,sans-serif';ctx.textAlign='right';
  ctx.fillText('MOVES',W-14,14);
  ctx.fillStyle=movesLeft<=5?'#ff8866':'#fff';ctx.font='bold 20px Georgia,serif';ctx.fillText(movesLeft,W-14,27);
  ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='600 9px system-ui,sans-serif';
  ctx.fillText('LEVEL '+lv.id,W/2,12);
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='300 10px system-ui,sans-serif';
  let g='';
  if(lv.goalType==='score')g='Score '+lv.targetScore;
  else if(lv.goalType==='collect')g=lv.collectGoals.map(x=>`${collected[x.type]||0}/${x.count} ${ANIMALS[x.type].name}`).join('  ');
  else g=`${score}/${lv.targetScore}  `+lv.collectGoals.map(x=>`${collected[x.type]||0}/${x.count} ${ANIMALS[x.type].name}`).join(' ');
  ctx.fillText(g,W/2,28);
  // Pause icon
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='16px system-ui';ctx.textAlign='right';ctx.fillText('⏸',W-14,50);
}

function renderGame(){ctx.clearRect(0,0,W,H);drawBoard();drawHUD()}

// ── INPUT ──
let touchR=-1,touchC=-1,mDown=false;
function toCell(x,y){
  const lv=LEVELS[currentLevel];
  const c=Math.floor((x-boardX)/cellSize),r=Math.floor((y-boardY)/cellSize);
  return(r>=0&&r<lv.rows&&c>=0&&c<lv.cols)?{r,c}:null;
}
function pDown(x,y){
  if(x>W-50&&y<hudH){togglePause();return}
  if(!gameActive||animating)return;
  const cell=toCell(x,y);if(!cell)return;
  if(board[cell.r][cell.c].stone||board[cell.r][cell.c].type<0)return;
  touchR=cell.r;touchC=cell.c;
  if(selectedCell){
    const dr=Math.abs(cell.r-selectedCell.r),dc=Math.abs(cell.c-selectedCell.c);
    if((dr===1&&dc===0)||(dr===0&&dc===1)){trySwap(selectedCell.r,selectedCell.c,cell.r,cell.c);selectedCell=null;renderGame();return}
    selectedCell=null;
  }
  selectedCell={r:cell.r,c:cell.c};renderGame();
}
function pMove(x,y){
  if(touchR<0||!gameActive||animating)return;
  const cell=toCell(x,y);if(!cell)return;
  if(Math.abs(cell.r-touchR)+Math.abs(cell.c-touchC)===1){selectedCell=null;trySwap(touchR,touchC,cell.r,cell.c);touchR=-1;touchC=-1}
}
function pUp(){touchR=-1;touchC=-1}
canvas.addEventListener('touchstart',e=>{e.preventDefault();pDown(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();pMove(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
canvas.addEventListener('touchend',()=>pUp(),{passive:false});
canvas.addEventListener('mousedown',e=>{mDown=true;pDown(e.clientX,e.clientY)});
canvas.addEventListener('mousemove',e=>{if(mDown)pMove(e.clientX,e.clientY)});
canvas.addEventListener('mouseup',()=>{mDown=false;pUp()});

// ── SWAP + MATCH ──
async function trySwap(r1,c1,r2,c2){
  if(board[r1][c1].stone||board[r2][c2].stone)return;
  if(board[r1][c1].chain||board[r2][c2].chain){sfxBad();return}
  animating=true;sfxSwap();
  await animSwap(r1,c1,r2,c2);
  swap(r1,c1,r2,c2);
  const m=findMatches();
  if(m.cells.length===0){await animSwap(r1,c1,r2,c2);swap(r1,c1,r2,c2);sfxBad();animating=false;renderGame();return}
  movesLeft--;await processAll();animating=false;checkEnd();renderGame();
}
function swap(r1,c1,r2,c2){const t=board[r1][c1];board[r1][c1]=board[r2][c2];board[r2][c2]=t}
function animSwap(r1,c1,r2,c2){
  return new Promise(res=>{
    const s=performance.now(),dur=140;
    const dx=(c2-c1)*cellSize,dy=(r2-r1)*cellSize;
    const a=board[r1][c1],b=board[r2][c2];
    (function step(now){
      const t=Math.min((now-s)/dur,1),e=t*(2-t);
      a._dx=dx*e;a._dy=dy*e;b._dx=-dx*e;b._dy=-dy*e;
      renderGame();
      t<1?requestAnimationFrame(step):((a._dx=a._dy=b._dx=b._dy=0),res());
    })(performance.now());
  });
}

function findMatches(){
  const lv=LEVELS[currentLevel],matched=new Set(),specials=[];
  for(let r=0;r<lv.rows;r++){let run=1;for(let c=1;c<=lv.cols;c++){
    if(c<lv.cols&&!board[r][c].stone&&!board[r][c-1].stone&&board[r][c].type>=0&&board[r][c].type===board[r][c-1].type)run++;
    else{if(run>=3){for(let k=c-run;k<c;k++)matched.add(r+','+k);if(run===4)specials.push({r,c:c-Math.ceil(run/2),sp:'hline'});if(run>=5)specials.push({r,c:c-Math.ceil(run/2),sp:'bomb'})}run=1}
  }}
  for(let c=0;c<lv.cols;c++){let run=1;for(let r=1;r<=lv.rows;r++){
    if(r<lv.rows&&!board[r][c].stone&&!board[r-1][c].stone&&board[r][c].type>=0&&board[r][c].type===board[r-1][c].type)run++;
    else{if(run>=3){for(let k=r-run;k<r;k++)matched.add(k+','+c);if(run===4)specials.push({r:r-Math.ceil(run/2),c,sp:'vline'});if(run>=5)specials.push({r:r-Math.ceil(run/2),c,sp:'bomb'})}run=1}
  }}
  return{cells:[...matched].map(s=>{const[r,c]=s.split(',').map(Number);return{r,c}}),specials};
}

function activateSpecial(r,c,sp,lv){
  const out=[];
  if(sp==='hline')for(let cc=0;cc<lv.cols;cc++){if(!board[r][cc].stone)out.push({r,c:cc})}
  else if(sp==='vline')for(let rr=0;rr<lv.rows;rr++){if(!board[rr][c].stone)out.push({r:rr,c})}
  else if(sp==='bomb')for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<lv.rows&&nc>=0&&nc<lv.cols&&!board[nr][nc].stone)out.push({r:nr,c:nc})}
  return out;
}

async function processAll(){
  let cas=0;
  while(true){
    const{cells,specials}=findMatches();if(cells.length===0)break;
    cas++;cas>1?sfxCombo():sfxMatch();
    const lv=LEVELS[currentLevel],keys=new Set(cells.map(c=>c.r+','+c.c));
    for(const{r,c}of cells){if(board[r][c].special){
      for(const e of activateSpecial(r,c,board[r][c].special,lv))if(!keys.has(e.r+','+e.c)){cells.push(e);keys.add(e.r+','+e.c)}
    }}
    score+=cells.length*10*cas;
    for(const{r,c}of cells){
      const cell=board[r][c];
      if(cell.type>=0&&collected[cell.type]!==undefined)collected[cell.type]++;
      [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{const nr=r+dr,nc=c+dc;if(nr>=0&&nr<lv.rows&&nc>=0&&nc<lv.cols)board[nr][nc].ice=false});
      cell.chain=false;
    }
    for(const sp of specials)if(board[sp.r]&&board[sp.r][sp.c]&&!board[sp.r][sp.c].stone&&!keys.has(sp.r+','+sp.c)){board[sp.r][sp.c].special=sp.sp;sfxPowerup()}
    // Animate removal
    await anim(160,t=>{cells.forEach(({r,c})=>{if(board[r][c].type>=0){board[r][c].scale=1-t;board[r][c].alpha=1-t}})});
    for(const{r,c}of cells)if(!board[r][c].stone)board[r][c]={type:-2,stone:false,ice:false,chain:false,special:null,oy:0,scale:1,alpha:1,_dx:0,_dy:0};
    // Drop
    for(let c=0;c<lv.cols;c++){
      let empty=lv.rows-1;
      for(let r=lv.rows-1;r>=0;r--){if(board[r][c].stone){empty=r-1;continue}if(board[r][c].type>=0){if(r!==empty){board[empty][c]=board[r][c];board[empty][c].oy=(r-empty)*-cellSize;board[r][c]={type:-2,stone:false,ice:false,chain:false,special:null,oy:0,scale:1,alpha:1,_dx:0,_dy:0}}empty--}}
      for(let r=empty;r>=0;r--){if(board[r][c].stone)continue;board[r][c]={type:Math.floor(Math.random()*lv.numTypes),stone:false,ice:false,chain:false,special:null,oy:-(empty-r+2)*cellSize,scale:1,alpha:1,_dx:0,_dy:0}}
    }
    await anim(200,t=>{const e=t<.5?2*t*t:-1+(4-2*t)*t;for(let r=0;r<lv.rows;r++)for(let c=0;c<lv.cols;c++)if(Math.abs(board[r][c].oy)>1)board[r][c].oy*=(1-e)});
    for(let r=0;r<lv.rows;r++)for(let c=0;c<lv.cols;c++)board[r][c].oy=0;
    renderGame();await sleep(60);
  }
}

function anim(dur,fn){
  return new Promise(res=>{
    const s=performance.now();
    (function step(now){
      const t=Math.min((now-s)/dur,1);fn(t);renderGame();
      t<1?requestAnimationFrame(step):res();
    })(performance.now());
  });
}

function checkEnd(){
  const lv=LEVELS[currentLevel];let met=true;
  if(lv.goalType==='score'||lv.goalType==='both')if(score<lv.targetScore)met=false;
  if((lv.goalType==='collect'||lv.goalType==='both')&&lv.collectGoals)for(const g of lv.collectGoals)if((collected[g.type]||0)<g.count)met=false;
  if(met){
    gameActive=false;const stars=score>=lv.star3?3:score>=lv.star2?2:1;
    saveProgress(currentLevel+1,stars);sfxWin();
    setTimeout(()=>{document.getElementById('win-score').textContent='Score: '+score;document.getElementById('win-stars').textContent='★'.repeat(stars)+'☆'.repeat(3-stars);document.getElementById('win-overlay').classList.add('active')},400);
  }else if(movesLeft<=0){
    gameActive=false;sfxLose();
    setTimeout(()=>{document.getElementById('lose-score').textContent='Score: '+score;document.getElementById('lose-overlay').classList.add('active')},400);
  }
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
</script>
